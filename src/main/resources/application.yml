spring:
  datasource:
    url: jdbc:mysql://localhost:3307/aws_db
    username: root
    password: rootpassword
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    database-change-log-table: Z_LIQ_CHANGELOG
    database-change-log-lock-table: Z_LIQ_CHANGELOG_LOCK
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  h2:
    console:
      enabled: false
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

logging :
  level:
    liquibase : INFO
app:
  jwt:
    secret: "01234567890123456789012345678901"
    expiration-seconds: 3600
  captcha:
    url: "https://captcha.example/widget"
    validate-url: "https://captcha.example/validate"
  sms:
    sender-api-url: "https://sms.example/send"
    sender-api-key: "replace-with-real-key"
