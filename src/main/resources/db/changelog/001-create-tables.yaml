databaseChangeLog:
  - changeSet:
      id: 001-create-core-tables
      author: codex
      changes:
        - createTable:
            tableName: tenants
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: VARCHAR(100), constraints: { nullable: false, unique: true } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: base_url, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: permissions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: description, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: tenant_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: active, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: roles
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: code, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: tenant_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: username, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: password_hash, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: system_user, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: password_expires_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: password_change_required, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: tenant_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: user_phone_numbers
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: phone_number, type: VARCHAR(32), constraints: { nullable: false, unique: true } }
              - column: { name: national_code, type: VARCHAR(64) }
              - column: { name: preferred_number, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: two_step_challenges
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: code, type: VARCHAR(20), constraints: { nullable: false } }
              - column: { name: target_phone, type: VARCHAR(32), constraints: { nullable: false } }
              - column: { name: expires_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: used, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: user_sessions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: session_token_id, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: expires_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: active, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: activity_logs
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT }
              - column: { name: action, type: VARCHAR(128), constraints: { nullable: false } }
              - column: { name: action_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: details, type: VARCHAR(1000), constraints: { nullable: false } }
              - column: { name: tenant_code, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: username, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: password_histories
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: password_hash, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: user_groups
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: tenant_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: father_user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: group_permissions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: group_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: permission_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: updated_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: created_by, type: VARCHAR(100) }
              - column: { name: updated_by, type: VARCHAR(100) }
              - column: { name: version, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: role_permissions
            columns:
              - column: { name: role_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: permission_id, type: BIGINT, constraints: { nullable: false } }

        - createTable:
            tableName: user_roles
            columns:
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: role_id, type: BIGINT, constraints: { nullable: false } }

        - addPrimaryKey:
            tableName: role_permissions
            columnNames: role_id, permission_id
            constraintName: pk_role_permissions

        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role_id
            constraintName: pk_user_roles

        - addUniqueConstraint:
            tableName: group_permissions
            columnNames: group_id, permission_id
            constraintName: uk_group_permission

        - addUniqueConstraint:
            tableName: roles
            columnNames: code, tenant_id
            constraintName: uk_role_code_tenant

        - addUniqueConstraint:
            tableName: users
            columnNames: username, tenant_id
            constraintName: uk_user_username_tenant

        - addUniqueConstraint:
            tableName: permissions
            columnNames: code, tenant_id
            constraintName: uk_permission_code_tenant

        - addForeignKeyConstraint:
            baseTableName: roles
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_role_tenant

        - addForeignKeyConstraint:
            baseTableName: permissions
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_permission_tenant

        - addForeignKeyConstraint:
