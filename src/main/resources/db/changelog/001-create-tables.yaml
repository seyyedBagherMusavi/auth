            referencedColumnNames: id
            constraintName: fk_session_user

        - addForeignKeyConstraint:
            baseTableName: activity_logs
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_log_user

        - addForeignKeyConstraint:
            baseTableName: password_histories
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_password_history_user

        - addForeignKeyConstraint:
            baseTableName: user_groups
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_user_group_tenant

        - addForeignKeyConstraint:
            baseTableName: user_groups
            baseColumnNames: father_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_group_father

        - addForeignKeyConstraint:
            baseTableName: group_permissions
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            constraintName: fk_group_permission_group

        - addForeignKeyConstraint:
            baseTableName: group_permissions
            baseColumnNames: permission_id
            referencedTableName: permissions
            referencedColumnNames: id
            constraintName: fk_group_permission_permission

        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_role_permission_role

        - addForeignKeyConstraint:
            baseTableName: role_permissions
            baseColumnNames: permission_id
            referencedTableName: permissions
            referencedColumnNames: id
            constraintName: fk_role_permission_permission

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_role_user

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: role_id
